<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ─── Essential Meta ─── -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── SEO & Google Friendly ─── -->
    <title>For My Bestie 💛</title>
    <meta name="description" content="A little surprise I made just for my bestie. Click to see the love!" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://your-buffer-site.netlify.app" />

    <!-- ─── Open Graph ─── -->
    <meta property="og:title" content="For My Bestie 💛" />
    <meta property="og:description" content="Hey bestie! I made this little surprise for you. Tap the button to see it." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-buffer-site.netlify.app" />
    <meta property="og:image" content="https://via.placeholder.com/1200x630/d4a373/ffffff?text=For+My+Bestie" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ─── Twitter Card ─── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="For My Bestie 💛" />
    <meta name="twitter:description" content="Hey bestie! I made this little surprise for you. Tap the button to see it." />

    <!-- ─── JSON‑LD Schema ─── -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebPage",
            "name": "For My Bestie 💛",
            "description": "A little surprise I made just for my bestie. Click to see the love!",
            "url": "https://your-buffer-site.netlify.app"
        }
    </script>

    <!-- ─── Fonts ─── -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fcf8f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: #ffffff;
            max-width: 520px;
            padding: 3.5rem 2.5rem;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 24px 64px rgba(45, 27, 26, 0.08);
            border: 1px solid rgba(212, 163, 115, 0.15);
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 32px 80px rgba(45, 27, 26, 0.10);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #2d1b1a;
            margin-bottom: 0.75rem;
        }

        h1 span {
            color: #d4a373;
        }

        p {
            color: rgba(61, 44, 42, 0.7);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: #2d1b1a;
            color: #fff;
            padding: 1rem 2.8rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.4s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(45, 27, 26, 0.12);
        }

        .btn:hover {
            background: #d4a373;
            color: #2d1b1a;
            transform: translateY(-3px);
            box-shadow: 0 12px 36px rgba(212, 163, 115, 0.30);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .footnote {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(61, 44, 42, 0.3);
        }

        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .btn {
                width: 100%;
                padding: 0.9rem 1.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <main class="card" role="main">
        <div class="icon">💛</div>
        <h1>a little <span>surprise</span></h1>
        <p>Hey bestie! I made this little surprise for you. Tap the button to see it.</p>

        <!-- ✅ YOUR LINK IS ALREADY EMBEDDED HERE ✅ -->
        <a href="https://maryam5fatima-creator.github.io/my-bestie-site/" target="_blank" rel="noopener noreferrer" class="btn">
            Click here to continue →
        </a>

        <p class="footnote">✨ opens in a new tab</p>
    </main>

</body>
</html>
